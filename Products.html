<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Seller Products | CrochetingHubb</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Page CSS -->
    <link rel="stylesheet" href="assets\css\products.css">
</head>
<body>

<!-- HEADER -->
<header class="seller-header">
    <div class="container d-flex justify-content-between align-items-center">
        <h2>CrochetingHubb</h2>
        <nav>
            <a href="#">Home</a>
            <a href="#" class="active">Products</a>
            <a href="#">Categories</a>
            <a href="#">Orders</a>
            <a href="#">Logout</a>
        </nav>
    </div>
</header>

<!-- MAIN -->
<main class="product-main">
    <div class="container">

        <!-- PAGE TITLE -->
        <h3 class="page-title">Manage Products</h3>

        <!-- ADD PRODUCT FORM -->
        <div class="product-card">
            <h4>Add / Update Product</h4>

            <form class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Product Name</label>
                    <input type="text" class="form-control" placeholder="Enter product name">
                </div>

                <div class="col-md-6">
                    <label class="form-label">Category</label>
                    <select class="form-select">
                        <option>Bags</option>
                        <option>Toys</option>
                        <option>Accessories</option>
                        <option>Home Decor</option>
                    </select>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Price (₹)</label>
                    <input type="number" class="form-control">
                </div>

                <div class="col-md-4">
                    <label class="form-label">Stock</label>
                    <input type="number" class="form-control">
                </div>

                <div class="col-md-4">
                    <label class="form-label">Status</label>
                    <select class="form-select">
                        <option>Available</option>
                        <option>Out of Stock</option>
                    </select>
                </div>

                <div class="col-12">
                    <label class="form-label">Product Description</label>
                    <textarea class="form-control" rows="3" placeholder="Write product details..."></textarea>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Product Image</label>
                    <input type="file" class="form-control">
                </div>

                <div class="col-md-6">
                    <label class="form-label">Tutorial Video Link (YouTube)</label>
                    <input type="url" class="form-control" placeholder="https://youtube.com/...">
                </div>

                <div class="col-12 text-end">
                    <button type="submit" class="btn-register">Save Product</button>
                </div>
            </form>
        </div>

        <!-- PRODUCT LIST -->
        <div class="product-card mt-5">
            <h4>Product List</h4>

            <div class="table-responsive">
                <table class="table align-middle">
                    <thead>
                        <tr>
                            <th>Image</th>
                            <th>Name</th>
                            <th>Category</th>
                            <th>Price</th>
                            <th>Stock</th>
                            <th>Video</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>

                

</body>
</html>
